version: '3.9'
services:
  app:
    build: .
    command: npm run dev
    ports:
      - '4000:4000'
    env_file:
      - .env
    depends_on:
      - db
      - redis
    volumes:
      - .:/usr/src/app
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: stellar_audit
    ports:
      - '5432:5432'
    volumes:
      - db-data:/var/lib/postgresql/data
  redis:
    image: redis:7
    ports:
      - '6379:6379'
volumes:
  db-data:
